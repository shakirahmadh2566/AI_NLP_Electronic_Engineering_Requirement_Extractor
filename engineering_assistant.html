<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Engineering Design Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .content {
            padding: 30px;
        }
        
        .input-section {
            background: #f7f9fc;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        
        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            font-family: monospace;
            resize: vertical;
            margin-bottom: 15px;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            background: #f0f0f0;
            border-radius: 10px;
            margin: 20px 0;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .results {
            display: none;
        }
        
        .section {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
        }
        
        .section h2 {
            color: #667eea;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e0e0e0;
        }
        
        .section h3 {
            color: #764ba2;
            margin: 15px 0 10px 0;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        
        th {
            background: #f7f9fc;
            color: #667eea;
            font-weight: 600;
        }
        
        tr:hover {
            background: #f7f9fc;
        }
        
        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }
        
        .info {
            background: #e3f2fd;
            color: #1976d2;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }
        
        @media (max-width: 768px) {
            .content {
                padding: 15px;
            }
            
            th, td {
                padding: 8px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔧 AI Engineering Design Assistant</h1>
            <p>Enter your engineering problem and get AI-powered requirements, decomposition, and component recommendations</p>
        </div>
        
        <div class="content">
            <div class="input-section">
                <label for="problem"><strong>📝 Engineering Problem:</strong></label>
                <textarea id="problem" rows="5" placeholder="Example: Design a smart greenhouse monitoring system that tracks temperature, humidity, and soil moisture. It should send alerts via WiFi when plants need water. Budget is $50, must run on batteries for 1 month..."></textarea>
                <button onclick="runPipeline()">🚀 Run Analysis</button>
            </div>
            
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>Processing your request with AI... This may take 30-60 seconds.</p>
            </div>
            
            <div id="results" class="results"></div>
        </div>
    </div>
    
    <script>
        async function runPipeline() {
            const problem = document.getElementById('problem').value;
            
            if (!problem.trim()) {
                alert('Please enter an engineering problem');
                return;
            }
            
            // Show loading
            document.getElementById('loading').style.display = 'block';
            document.getElementById('results').style.display = 'none';
            
            try {
                // Call the Python backend via a simple HTTP server
                const response = await fetch('http://localhost:8502/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ prompt: problem })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const result = await response.json();
                displayResults(result);
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('results').innerHTML = `
                    <div class="error">
                        <strong>⚠️ Connection Error</strong><br>
                        Make sure the backend server is running.<br>
                        Run: <code>python backend_server.py</code><br>
                        Error: ${error.message}
                    </div>
                `;
                document.getElementById('results').style.display = 'block';
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }
        
        function displayResults(result) {
            let html = '';
            
            // Layer 1: Requirements
            if (result.layer1 && !result.layer1.error) {
                html += `
                    <div class="section">
                        <h2>📌 Layer 1: Requirements</h2>
                        <table>
                            <thead>
                                <tr><th>Category</th><th>Requirements</th></tr>
                            </thead>
                            <tbody>
                `;
                
                for (const [category, items] of Object.entries(result.layer1)) {
                    if (items && !category.includes('disabled')) {
                        let requirements = '';
                        if (Array.isArray(items)) {
                            requirements = items.join(', ');
                        } else if (typeof items === 'object') {
                            requirements = JSON.stringify(items);
                        } else {
                            requirements = String(items);
                        }
                        html += `<tr><td><strong>${category.replace(/_/g, ' ').toUpperCase()}</strong></td><td>${requirements}</td></tr>`;
                    }
                }
                
                html += `</tbody></table></div>`;
            }
            
            // Layer 2: Decomposition
            if (result.layer2 && !result.layer2.error) {
                html += `
                    <div class="section">
                        <h2>📐 Layer 2: System Decomposition</h2>
                        <table>
                            <thead><tr><th>Module</th><th>Requirements</th></tr></thead>
                            <tbody>
                `;
                
                for (const [category, items] of Object.entries(result.layer2)) {
                    if (items && items.length > 0) {
                        const requirements = Array.isArray(items) ? items.join(', ') : String(items);
                        html += `<tr><td><strong>${category.replace(/_/g, ' ').toUpperCase()}</strong></td><td>${requirements}</td></tr>`;
                    }
                }
                
                html += `</tbody></table></div>`;
            }
            
            // Layer 3: Component Recommendations
            if (result.layer3 && !result.layer3.error) {
                html += `<div class="section"><h2>⚙️ Layer 3: Component Recommendations</h2>`;
                
                for (const [category, components] of Object.entries(result.layer3)) {
                    if (components && components.length > 0) {
                        html += `<h3>${category.replace(/_/g, ' ').toUpperCase()}</h3>
                                <table>
                                    <thead><tr><th>Component</th><th>Pros</th><th>Cons</th><th>Source</th><th>Use Case</th></tr></thead>
                                    <tbody>`;
                        
                        for (const comp of components) {
                            const pros = Array.isArray(comp.pros) ? comp.pros.join(', ') : comp.pros;
                            const cons = Array.isArray(comp.cons) ? comp.cons.join(', ') : comp.cons;
                            html += `<tr>
                                        <td><strong>${comp.name || 'N/A'}</strong></td>
                                        <td>${pros || 'None'}</td>
                                        <td>${cons || 'None'}</td>
                                        <td>${comp.evidence_source || 'LLM'}</td>
                                        <td>${comp.use_case || 'General'}</td>
                                     </tr>`;
                        }
                        
                        html += `</tbody></table>`;
                    }
                }
                
                html += `</div>`;
            }
            
            if (result.layer1?.error || result.layer2?.error || result.layer3?.error) {
                html += `<div class="error"><strong>⚠️ Errors:</strong><br>`;
                if (result.layer1?.error) html += `Layer 1: ${result.layer1.error}<br>`;
                if (result.layer2?.error) html += `Layer 2: ${result.layer2.error}<br>`;
                if (result.layer3?.error) html += `Layer 3: ${result.layer3.error}<br>`;
                html += `</div>`;
            }
            
            document.getElementById('results').innerHTML = html;
            document.getElementById('results').style.display = 'block';
        }
    </script>
</body>
</html>
